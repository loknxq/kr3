<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IT English | Полные ответы по учебнику</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Open Sans', sans-serif;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .app-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 3rem;
            backdrop-filter: blur(2px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            padding: 1.5rem;
        }

        .flashcard {
            background: #fef9ef;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,245,225,0.8) 0%, #fff5e6 100%);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.7);
            min-height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            border: 1px solid rgba(255,245,200,0.8);
        }

        .flashcard:active {
            transform: scale(0.98);
        }

        .card-inner {
            padding: 2rem 2rem 1.8rem 2rem;
            text-align: center;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: 0.2s;
        }

        .question-side h2 {
            font-size: 1.7rem;
            color: #1e3c4a;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            border-left: 6px solid #ff9f4a;
            padding-left: 1rem;
            text-align: left;
        }

        .question-side p {
            color: #2c4b5e;
            font-size: 1rem;
            margin-top: 0.5rem;
            text-align: left;
            font-weight: 500;
        }

        .answer-side {
            text-align: left;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .answer-side h3 {
            color: #c4450c;
            font-size: 1.4rem;
            margin-bottom: 1rem;
            border-bottom: 2px dashed #ffb77c;
            display: inline-block;
        }

        .answer-side p {
            color: #2c3e2f;
            font-size: 0.98rem;
            line-height: 1.5;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .badge-hint {
            background: #ffe0b5;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: bold;
            color: #b45f1b;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #ffcd94;
        }

        .badge-hint:hover {
            background: #ffd6a5;
            transform: scale(0.97);
        }

        .hint-text {
            background: #f1e7d6;
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #7a5800;
            border-left: 4px solid #ffa33e;
            display: none;
        }

        .hint-text.show {
            display: block;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.8rem;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #2d4f6e;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-family: inherit;
        }

        .nav-btn:hover {
            background: #1d3a52;
            transform: translateY(-2px);
        }

        .score-panel {
            background: #0a1c29c9;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            gap: 1.5rem;
            font-weight: bold;
            color: #f0ede8;
        }

        .score-panel span {
            font-size: 1.5rem;
            font-weight: 800;
            margin-left: 6px;
            color: #ffcd94;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 1rem;
            justify-content: center;
        }

        .action-btn {
            background: #3a6b47;
            border: none;
            font-size: 1rem;
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            max-width: 140px;
        }

        .action-btn.unknown {
            background: #9e4a2e;
        }

        .action-btn:hover {
            filter: brightness(0.9);
            transform: scale(0.96);
        }

        .counter-text {
            font-size: 0.85rem;
            background: #00000066;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            color: #ddd;
            display: inline-block;
            margin-bottom: 12px;
        }

        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #c0cfda;
        }

        @media (max-width: 600px) {
            .card-inner { padding: 1.5rem; }
            .question-side h2 { font-size: 1.2rem; }
            .answer-side p { font-size: 0.85rem; }
            .action-btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="counter-text" style="background:#2c3e2f;">📇 Карточка <span id="currentIdxSpan">1</span> / <span id="totalSpan">45</span></div>

    <div class="flashcard" id="flashcard">
        <div class="card-inner" id="cardInner"></div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
        <div class="badge-hint" id="hintButton">💡 Показать подсказку</div>
        <div class="score-panel">
            <div>✅ <span id="correctCount">0</span></div>
            <div>❌ <span id="wrongCount">0</span></div>
        </div>
    </div>
    <div id="hintContainer" class="hint-text"></div>

    <div class="action-buttons">
        <button class="action-btn" id="knowBtn">✅ Знаю</button>
        <button class="action-btn unknown" id="dontKnowBtn">❌ Не знаю</button>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" id="prevBtn">◀ Назад</button>
        <button class="nav-btn" id="nextBtn">Вперёд ▶</button>
    </div>
    <footer>Клик по карточке — перевернуть | Подсказка поможет вспомнить ключевые слова</footer>
</div>

<script>
    // ---------- ПОЛНЫЕ ОТВЕТЫ (как в расписанном варианте) ----------
    const flashcards = [
        { topic: "1. Types of wired internet connections", answer: "The main types are DSL, Cable Internet, and Fiber-optic Internet. DSL (Digital Subscriber Line) is a high-speed connection that uses standard telephone lines, allowing digital signals and simultaneous internet and phone service. Cable Internet uses the infrastructure of cable TV networks (coaxial cable) and is highly reliable but uses shared bandwidth, which can slow down during peak hours. Fiber-optic Internet uses fiber-optic cables and light signals to transfer data, making it incredibly fast with low attenuation and distortion over long distances.", hint: "DSL / Cable / Fiber" },
        { topic: "2. DSL vs dial‑up connection", answer: "A dial‑up connection is set up by dialing a phone number and uses the same frequency for voice and data, meaning you cannot use the phone and internet at the same time. DSL, however, uses higher frequency bands for data transmission, allowing it to be delivered simultaneously with wired telephone service through the same line, providing a faster, always-on connection.", hint: "Frequency & simultaneity" },
        { topic: "3. Three wireless internet access technologies", answer: "The three wireless technologies are Wi-Fi, cellular, and satellite Internet. Wi-Fi uses radio waves for local area networking. Cellular networks are distributed over land areas called 'cells,' each with a base station (cell tower) for voice and data transmission. Satellite Internet uses a geostationary satellite and requires a satellite dish and a modem; signals travel long distances, which can cause delay (latency).", hint: "Wi-Fi, Cellular, Satellite" },
        { topic: "4. Three types of DSL connections", answer: "The three types of DSL connections are ADSL, SDSL, and VDSL. ADSL (Asymmetric Digital Subscriber Line) has a faster download speed than upload speed. SDSL (Symmetric Digital Subscriber Line) offers equal speeds for uploads and downloads. VDSL (Very high bit rate DSL) is a high-speed version of DSL.", hint: "Asymmetric, Symmetric, Very high bit rate" },
        { topic: "5. Packet switching vs circuit switching", answer: "Circuit switching establishes a dedicated communication path before data transmission begins, and no other devices can use this path, leading to wasted bandwidth. Packet switching divides data into multiple units called packets, which can be routed individually through different paths, providing a more efficient use of bandwidth.", hint: "Dedicated path vs packets" },
        { topic: "6. Two subtypes of packet switching", answer: "The two subtypes are datagram packet switching and virtual circuit switching. In datagram packet switching, there is no dedicated channel, and packets can be routed individually through different paths, then reassembled based on sequence numbers. Virtual circuit switching is connection-oriented; a virtual connection is established between the source and destination, and packets are then routed along this path sequentially.", hint: "Datagram / Virtual circuit" },
        { topic: "7. TCP/IP model (layers, protocols)", answer: "The TCP/IP model is a stack of protocols split into four layers. The Application layer includes protocols like HTTP, FTP, and SMTP for user services. The Transport layer provides a channel for data transmission using TCP (guarantees delivery) and UDP (for real-time communication). The Internet layer uses the Internet Protocol (IP) to address and route data packets. The Network Interface layer includes protocols like Ethernet to deliver data across a physical medium.", hint: "4 layers: App, Transport, Internet, Net Interface" },
        { topic: "8. Difference between TCP and UDP", answer: "TCP (Transmission Control Protocol) guarantees the delivery of data through an acknowledgement and ensures the transmission of missing packets. UDP (User Datagram Protocol) does not verify the connection between the receiving and sending hosts and is used when real-time communication is needed, such as for making phone calls.", hint: "Reliable vs fast/no verification" },
        { topic: "9. Difference between Internet and WWW", answer: "The World Wide Web (WWW) is not synonymous with the Internet, which pre-existed the Web and upon which the Web is built. The Internet is a worldwide computer network, while the WWW is an information system of documents and web resources accessed through the Internet using a web browser.", hint: "Network vs information system" },
        { topic: "10. Three types of search engines and features", answer: "Crawler-based search engines (like Google) automatically create listings using a crawler or spider. Human-powered directories (like Yahoo! Directory) depend on human editors to compile their listings manually. Meta-search engines (like Dogpile) do not have their own database but send user queries to several other search engines and compile the top results into one list.", hint: "Crawler / Directory / Meta" },
        { topic: "11. Three steps of crawler-based search engine", answer: "Crawling: a special program (crawler/spider) finds new and updated content by following links. Indexing: process of identifying keywords that best describe the page and storing it in a database. Ranking: ordering search results from most relevant to least relevant using algorithms.", hint: "Crawl → Index → Rank" },
        { topic: "12. What makes meta-search engines different", answer: "A meta-search engine does not have a database of indexed pages of its own. It sends users' queries to several other search engines and compiles top results from each into one overall list, whereas crawler-based and human-powered directories maintain their own databases.", hint: "No own index, aggregates" },
        { topic: "13. Crawler-based vs human-powered directories", answer: "Crawler-based search engines create their listings automatically using a crawler or spider. Human-powered directories depend on human editors to compile their listings manually; a site description is submitted and then manually reviewed and added to a category.", hint: "Automatic vs manual editing" },
        { topic: "14. Factors determining higher ranking", answer: "The ranking algorithm determines higher ranking. The search engine ranking algorithm might check if your search term shows up in the page title or if all the words show up close together. Google also invented an algorithm that takes into account how many other web pages are linked to a page (backlinks).", hint: "Title, word proximity, backlinks" },
        { topic: "15. Search engine vs web browser", answer: "A search engine is a software program that provides information according to a user query by looking across all websites it can index. A web browser (like Google Chrome or Firefox) is a program that runs on your hardware, decodes a web address, and renders the code of a website on the screen. With a browser, you point at one website; with a search engine, you are given a list of potential places to go.", hint: "Finder vs viewer" },
        { topic: "16. Four search engines alternative to Google", answer: "Bing (Microsoft product with internal features like currency conversion). Baidu (dominant search engine in China, though heavily censored). Yandex (holds about 60% of the search engine market share in Russia, user-friendly). Ecosia (CO2-neutral search engine that uses profit to plant trees, runs on 100% renewable energy).", hint: "Bing, Baidu, Yandex, Ecosia" },
        { topic: "17. Classification of programming languages", answer: "Programming languages can be divided into low-level languages and high-level languages. Low-level languages (machine code and assembly languages) are closer to the hardware. High-level languages (FORTRAN, BASIC, C, Java, Python) are closer to the English language, making them easier to write, and are portable (can be executed on many computers).", hint: "Low-level vs High-level" },
        { topic: "18. OOP and three key features", answer: "OOP (Object-Oriented Programming) makes code more intuitive and reusable. Encapsulation: bundling data and program instructions into modules called 'objects'. Inheritance: a class (e.g., Squares) automatically inherits properties of another class (e.g., Rectangles). Polymorphism: different objects receive the same instructions but deal with them in different ways.", hint: "Encapsulation, Inheritance, Polymorphism" },
        { topic: "19. Compiler, interpreter, assembler", answer: "Assembler translates assembly language program into machine code. Compiler translates a high-level language program (source code) into machine code in one go (object code). Interpreter translates the source code line by line as the program is running.", hint: "One-go vs line-by-line" },
        { topic: "20. Three main tools in web design", answer: "HTML (Hypertext Markup Language) describes the structure of information on a webpage using tags. CSS (Cascading Style Sheets) improves the appearance of a webpage by defining its styling and layout. JavaScript is used to make web pages interactive and user-friendly, allowing developers to create dynamically updating content, animations, and clickable buttons.", hint: "HTML, CSS, JS" },
        { topic: "21. Frontend vs backend development", answer: "Frontend development focuses on the visible part of the site that the user interacts with (the interface), using tools like HTML, CSS, and JavaScript. Backend development is associated with the part of the site connected to the server, where user requests are processed, working with databases and servers behind the scenes.", hint: "Visible UI vs server-side" },
        { topic: "22. Advantages and disadvantages of website builders", answer: "Advantages: allow anyone to build a website without learning HTML, include a wide variety of predesigned templates, incorporate WYSIWYG editors for easy editing. Disadvantages (implied): less customization control compared to coding from scratch, potentially generic design if templates are not heavily modified.", hint: "Easy, templates but limited" },
        { topic: "23. SEO and main purpose", answer: "SEO stands for Search Engine Optimization. It refers to a set of improvements that help your website to rank higher in Search Engine Results Pages. Its main purpose is to get users to visit your site without directly paying for advertising, as websites on the first page of search results receive the majority of clicks.", hint: "Higher ranking, organic traffic" },
        { topic: "24. On-page SEO vs off-page SEO", answer: "On-page SEO refers to optimizations on the website itself (content, keywords, HTML tags). Off-page SEO refers to actions taken outside the website (link building, social media signals).", hint: "On site vs external factors" },
        { topic: "25. Organic results", answer: "Organic results are the listings on a search engine results page that are not paid advertisements. SEO is all about getting users to visit your site without directly paying for advertising, meaning through organic results.", hint: "Unpaid search listings" },
        { topic: "26. Malware and types", answer: "Malware (malicious software) is programs designed to infiltrate or damage your computer. Types include: viruses (infect applications to replicate), worms (standalone, spread via email), Trojans (disguised as useful, open backdoor), ransomware (encrypt data, demand payment), spyware (collect personal info), keyloggers (record keystrokes), adware (display unwanted ads), miners (hijack CPU/GPU to mine cryptocurrency).", hint: "Virus, Worm, Trojan, Ransomware, Spyware..." },
        { topic: "27. Four routines of a virus", answer: "Misdirection routine: enables the virus to hide itself. Reproduction routine: allows it to copy itself to other programs. Trigger: causes the payload to be activated at a particular time or event. Payload: the destructive or harmless action the virus performs.", hint: "Hide, Copy, Activate, Damage" },
        { topic: "28. Types of cybercrime", answer: "Phishing (attempting to steal sensitive information via fake emails). Website defacement (changing the visual appearance of a web page). Salami shaving (stealing small amounts of money from many accounts). Piggybacking (obtaining unauthorized wireless access to a network). Software piracy (unauthorized copying of a program).", hint: "Phishing, defacement, salami, piggybacking, piracy" },
        { topic: "29. Virus vs worm", answer: "Viruses must be triggered by the activation of their host (e.g., running an infected file). Worms are standalone malicious programs that can self-replicate and propagate independently as soon as they have breached the system, without requiring a triggering event or human intervention.", hint: "Host activation needed vs standalone" },
        { topic: "30. Virus vs Trojan", answer: "A virus has a reproduction routine that enables it to infect other programs. A Trojan horse does not replicate itself; it is a program that has a payload but does not have a reproduction routine, disguised as a legitimate-looking file to gain unauthorized access.", hint: "Replicates vs disguised" },
        { topic: "31. DoS vs DDoS attack", answer: "DoS (Denial of Service) attack originates from a single source, making it easier to handle. DDoS (Distributed Denial of Service) attack comes from multiple sources, often a botnet (network of compromised computers), which overloads a server with traffic, making it harder to stop.", hint: "Single source vs distributed (botnet)" },
        { topic: "32. Firewall and filters", answer: "A firewall is a program used to protect private networks. Firewall filters can be based on IP addresses (blocking a specific IP), domain names (blocking access to/from specific domains), or specific words or phrases in the data packets.", hint: "IP, domain, keywords" },
        { topic: "33. Signature-based vs heuristic scanning", answer: "Signature-based scanning matches signatures (fingerprints) found in files with a database of known malware. Heuristic scanning uses rules and algorithms to look for commands that may indicate malicious intent, allowing it to recognize new malware without an exact match in the database.", hint: "Known patterns vs behavior detection" },
        { topic: "34. Signature (in antivirus)", answer: "A signature is the distinguishing feature of a virus that sets it apart from other programs. It is like a fingerprint, which makes the virus recognizable and a potential target for antivirus software.", hint: "Fingerprint of malware" },
        { topic: "35. Two main types of encryption", answer: "Symmetric encryption: all parties have the same key, which must be kept secret. Asymmetric (public key) encryption: two keys are used — a public key (widely available) and a private key (kept secret). Information encrypted with the public key can only be decrypted by the corresponding private key.", hint: "One key vs key pair" },
        { topic: "36. Two methods of breaking a cipher", answer: "Brute force: trying random keys until the right one is found. Cryptanalysis: finding a weakness in the cipher and exploiting it.", hint: "Random keys vs flaw exploitation" },
        { topic: "37. What is CAPTCHA", answer: "CAPTCHA stands for Completely Automated Public Turing test to tell Computers and Humans Apart. It is a tool implemented on websites to distinguish human users from bots.", hint: "Human verification test" },
        { topic: "38. Turing test procedure", answer: "The Turing test (Imitation Game) involves two contestants (one human, one computer) and a judge. The judge asks questions to both contestants. If the judge's accuracy is less than 50% (cannot reliably tell which is human and which is a machine), it suggests the computer is a good simulation of a human and is intelligent.", hint: "Judge, human, machine, <50% accuracy" },
        { topic: "39. Classification vs clustering", answer: "Classification is classifying data sets into predefined classes. Clustering is classifying data into different, undefined categories. Both are specific tasks that can be accomplished by neural networks.", hint: "Predefined classes vs undefined categories" },
        { topic: "40. Backpropagation", answer: "Backpropagation is a feedback process by which neural networks learn. It involves comparing the output a network produces with the output it was meant to produce, and using the difference to modify the weights of the connections between units, working backwards from output units to input units.", hint: "Error feedback, adjust weights backward" },
        { topic: "41. Artificial neural network and tasks", answer: "An artificial neural network is a computing system that simulates the work of the biological brain by creating densely interconnected nodes (artificial neurons). Tasks include: face recognition, autonomous driving, machine translation, fraud detection, classification, clustering, and prediction.", hint: "Brain simulation, many AI tasks" },
        { topic: "42. ANN similarity to brain and structure", answer: "Similar because it consists of densely interconnected nodes (artificial neurons) corresponding to synapses. Structure: input units (receive information), hidden units (form majority of artificial brain), output units (signal the response).", hint: "Input → hidden → output" },
        { topic: "43. Why neural networks are 'black boxes'", answer: "Neural networks are compared to 'black boxes' because the user feeds in data and receives answers. You can fine-tune the answers, but you do not have access to the exact decision-making process inside the network.", hint: "No access to internal logic" },
        { topic: "44. IoT and major problems", answer: "IoT (Internet of Things) is a system of interrelated physical objects with unique identifiers (UIDs) that can transfer data over a network without human interaction. Major problems: increased risk of hackers stealing confidential information, challenge of collecting/managing data from millions of devices, risk of all devices being corrupted if there is a bug, lack of international standard of compatibility.", hint: "Security, scale, bugs, standards" },
        { topic: "45. HLAI and risks", answer: "HLAI (Human-like Artificial Intelligence) refers to creating intelligence that matches human intelligence. Risks: as machines become better substitutes for human labor, workers lose economic and political bargaining power and become increasingly dependent on those who control the technology. When AI focuses on augmenting humans rather than mimicking them, humans retain control.", hint: "Mimicking humans → dependency & power loss" }
    ];

    // --- состояние ---
    let currentIndex = 0;
    let isFlipped = false;
    let correct = 0;
    let wrong = 0;
    const total = flashcards.length;

    const cardInner = document.getElementById('cardInner');
    const flashcardDiv = document.getElementById('flashcard');
    const hintButton = document.getElementById('hintButton');
    const hintContainer = document.getElementById('hintContainer');
    const knowBtn = document.getElementById('knowBtn');
    const dontKnowBtn = document.getElementById('dontKnowBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const correctSpan = document.getElementById('correctCount');
    const wrongSpan = document.getElementById('wrongCount');
    const currentIdxSpan = document.getElementById('currentIdxSpan');
    const totalSpan = document.getElementById('totalSpan');

    totalSpan.textContent = total;

    function renderCard() {
        const card = flashcards[currentIndex];
        if (!card) return;
        if (!isFlipped) {
            cardInner.innerHTML = `
                <div class="question-side">
                    <h2>📌 ${card.topic}</h2>
                    <p>👆 Кликните по карточке, чтобы увидеть полный ответ из учебника</p>
                    <div style="margin-top: 20px; font-size:0.85rem; color:#6f5b3e;">💡 Нажмите лампочку для подсказки</div>
                </div>
            `;
        } else {
            cardInner.innerHTML = `
                <div class="answer-side">
                    <h3>📖 Полный ответ</h3>
                    <p>${card.answer.replace(/\n/g, '<br>')}</p>
                </div>
            `;
        }
        currentIdxSpan.textContent = currentIndex + 1;
        hintContainer.classList.remove('show');
        hintContainer.innerHTML = '';
    }

    function showHint() {
        const card = flashcards[currentIndex];
        if (card && card.hint) {
            hintContainer.innerHTML = `<span style="font-weight:bold;">💡 Ключевые слова:</span> ${card.hint}`;
            hintContainer.classList.add('show');
        } else {
            hintContainer.innerHTML = `<span>🧠 Попробуйте вспомнить самостоятельно!</span>`;
            hintContainer.classList.add('show');
        }
    }

    function flipCard() {
        isFlipped = !isFlipped;
        renderCard();
    }

    function markCorrect() {
        correct++;
        updateScoreUI();
        moveToNext();
    }

    function markWrong() {
        wrong++;
        updateScoreUI();
        moveToNext();
    }

    function moveToNext() {
        if (currentIndex + 1 < total) {
            currentIndex++;
            isFlipped = false;
            renderCard();
            hintContainer.classList.remove('show');
        } else {
            alert(`🏆 Результат: Правильных ответов: ${correct}, Неправильных: ${wrong}. Отличная работа!`);
        }
    }

    function moveToPrev() {
        if (currentIndex - 1 >= 0) {
            currentIndex--;
            isFlipped = false;
            renderCard();
            hintContainer.classList.remove('show');
        }
    }

    function updateScoreUI() {
        correctSpan.textContent = correct;
        wrongSpan.textContent = wrong;
    }

    // Event listeners
    flashcardDiv.addEventListener('click', (e) => {
        if (e.target.closest('.badge-hint')) return;
        if (e.target.closest('.action-btn')) return;
        if (e.target.closest('.nav-btn')) return;
        flipCard();
    });

    hintButton.addEventListener('click', (e) => {
        e.stopPropagation();
        showHint();
    });

    knowBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        markCorrect();
    });

    dontKnowBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        markWrong();
    });

    prevBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        moveToPrev();
    });

    nextBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        moveToNext();
    });

    renderCard();
    updateScoreUI();
</script>
</body>
</html>
